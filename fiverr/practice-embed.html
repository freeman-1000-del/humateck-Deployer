<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product demo</title>
  <style>body{margin:0;background:#050b14}</style>
</head>
<body>
  <script>
(function () {
  window.__HUMATECK_OPEN_PRACTICE__ = true;
  window.__HUMATECK_PURE_PRODUCT__ = true;
  var STORAGE_BASE = "https://ajvtyotblrtexcxuazqm.supabase.co/storage/v1/object/public/humateck-site";

  var src = STORAGE_BASE + "/deployer-en/index.html?v=" + Date.now();
  fetch(src, { cache: "no-store" })
    .then(function (res) {
      if (!res.ok) throw new Error(String(res.status));
      return res.text();
    })
    .then(function (html) {
      html = html.replace(/<script[^>]*pricing-config[^>]*>\s*<\/script>/gi, "");
      html = html.replace(/<script[^>]*pricing-apply[^>]*>\s*<\/script>/gi, "");
      document.open();
      document.write(html);
      document.close();
      document.body.classList.add("humateck-open-practice", "humateck-pure-product");
      var s = document.createElement("script");
      s.src = "/fiverr/product-pure-sanitize.js?v=" + Date.now();
      document.body.appendChild(s);
    })
    .catch(function () {
      document.body.innerHTML =
        '<p style="color:#e6e0d4;font-family:Arial,sans-serif;padding:24px;text-align:center">Could not load the product demo. ' +
        '<a href="mailto:support@humateck.com" style="color:#6ca6ff">support@humateck.com</a></p>';
    });
})();
  </script>
</body>
</html>
